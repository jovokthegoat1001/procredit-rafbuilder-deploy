# nginx config for the LOCAL docker-compose frontend container.
# Serves the SPA and proxies /api to the backend service ("server" is the compose
# service name). On Netlify this file is NOT used — netlify.toml handles the proxy.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Uploads (GIS/LTR/FS/CBR) can be large; the API accepts up to 20 MB per file.
  client_max_body_size 25m;

  # Proxy API calls to the backend container.
  location /api/ {
    proxy_pass http://server:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;   # extraction calls the model and can take a while
    proxy_send_timeout 300s;
  }

  # SPA fallback — serve index.html for any non-file route.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
